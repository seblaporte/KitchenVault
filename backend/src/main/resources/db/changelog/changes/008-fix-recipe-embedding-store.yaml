databaseChangeLog:

  - changeSet:
      id: 008-drop-recipe-embedding-store
      author: seblaporte
      changes:
        - dropTable:
            tableName: recipe_embedding_store

  - changeSet:
      id: 008-recreate-recipe-embedding-store
      author: seblaporte
      changes:
        - createTable:
            tableName: recipe_embedding_store
            columns:
              - column:
                  name: embedding_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: embedding
                  type: "vector(384)"
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: text
              - column:
                  name: metadata
                  type: jsonb
        - sql:
            sql: CREATE INDEX ON recipe_embedding_store USING hnsw (embedding vector_cosine_ops);
