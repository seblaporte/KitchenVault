services:
  postgres:
    image: docker.io/pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cookidoo
      POSTGRES_USER: cookidoo
      POSTGRES_PASSWORD: cookidoo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookidoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  cookidoo-service:
    build: ./cookidoo-service
    ports:
      - "8001:8001"
    environment:
      COOKIDOO_EMAIL: ${COOKIDOO_EMAIL}
      COOKIDOO_PASSWORD: ${COOKIDOO_PASSWORD}
      COOKIDOO_COUNTRY_CODE: ${COOKIDOO_COUNTRY_CODE:-fr}
      COOKIDOO_LANGUAGE: ${COOKIDOO_LANGUAGE:-fr-FR}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
