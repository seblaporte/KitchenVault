spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/cookidoo
    username: cookidoo
    password: cookidoo
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

ai:
  ovh:
    api-key: ${OVH_AI_ENDPOINTS_ACCESS_TOKEN:}
    model-name: gpt-oss-120b
    base-url: https://oai.endpoints.kepler.ai.cloud.ovh.net/v1
  ovh-embedding:
    api-key: ${OVH_AI_ENDPOINTS_ACCESS_TOKEN:}
    model-name: bge-m3
    base-url: https://oai.endpoints.kepler.ai.cloud.ovh.net/v1
  shopping-list:
    basic-necessities:
      - eau
      - sel
      - poivre
      - huile
      - "huile d'olive"
      - sucre
      - farine
      - beurre
      - vinaigre
      - moutarde
      - levure chimique
      - bicarbonate
      - laurier
      - thym
      - paprika
      - cumin

cookidoo:
  service:
    url: http://localhost:8001
  sync:
    cron: "0 0 3 * * *"
    resync-after-hours: 24

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    fr.seblaporte.kitchenvault: INFO
    org.liquibase: INFO
    dev.langchain4j: DEBUG
