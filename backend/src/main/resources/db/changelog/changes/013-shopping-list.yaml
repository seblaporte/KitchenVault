databaseChangeLog:

  - changeSet:
      id: 013-create-shopping-list-item
      author: seblaporte
      changes:
        - createTable:
            tableName: shopping_list_item
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: varchar(255)
              - column:
                  name: category
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: checked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: source_recipe_ids
                  type: jsonb
                  defaultValue: "[]"
                  constraints:
                    nullable: false
              - column:
                  name: custom
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
