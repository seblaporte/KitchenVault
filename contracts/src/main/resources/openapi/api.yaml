openapi: 3.1.0
info:
  title: KitchenVault API
  description: |
    API REST de KitchenVault — récupère et expose les recettes Cookidoo stockées en base.
  version: 1.0.0
  contact:
    name: Sebastien Laporte

servers:
  - url: http://localhost:8080
    description: Serveur de développement local

tags:
  - name: sync
    description: Synchronisation avec Cookidoo
  - name: embedding
    description: Indexation des embeddings pour la recherche sémantique
  - name: admin
    description: Administration et statistiques
  - name: recipes
    description: Consultation des recettes
  - name: collections
    description: Consultation des collections
  - name: categories
    description: Consultation des catégories
  - name: menu-plan
    description: Planification du menu
  - name: chat
    description: Chat IA avec suggestions de recettes et planification

paths:

  # ─── Synchronisation ─────────────────────────────────────────────────────────

  /api/v1/sync:
    post:
      tags: [sync]
      operationId: triggerSync
      summary: Déclenche une synchronisation manuelle
      description: |
        Lance une synchronisation asynchrone avec Cookidoo.
        Retourne immédiatement le SyncRun créé avec le statut RUNNING.
      responses:
        "202":
          description: Synchronisation démarrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunDto"
        "409":
          description: Une synchronisation est déjà en cours
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  /api/v1/sync/latest:
    get:
      tags: [sync]
      operationId: getLatestSync
      summary: Retourne le dernier SyncRun
      description: Retourne le dernier SyncRun, quel que soit son statut.
      responses:
        "200":
          description: Dernier SyncRun
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunDto"
        "404":
          description: Aucune synchronisation n'a encore eu lieu

  /api/v1/sync/history:
    get:
      tags: [sync]
      operationId: getSyncHistory
      summary: Historique paginé des synchronisations
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/sizeParam"
      responses:
        "200":
          description: Page d'historique de synchronisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunPageDto"

  # ─── Embeddings ──────────────────────────────────────────────────────────────

  /api/v1/embeddings/index:
    post:
      tags: [embedding]
      operationId: triggerEmbeddingIndexation
      summary: Déclenche l'indexation des embeddings
      description: |
        Lance l'indexation asynchrone des embeddings pour toutes les recettes.
        Permet de réindexer sans relancer une synchronisation Cookidoo complète.
      responses:
        "202":
          description: Indexation démarrée

  # ─── Administration ──────────────────────────────────────────────────────────

  /api/v1/admin/stats:
    get:
      tags: [admin]
      operationId: getAdminStats
      summary: Statistiques de la base de données
      description: Retourne les compteurs globaux et la date de la dernière sync réussie.
      responses:
        "200":
          description: Statistiques
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatsDto"

  # ─── Recettes ────────────────────────────────────────────────────────────────

  /api/v1/recipes:
    get:
      tags: [recipes]
      operationId: listRecipes
      summary: Liste paginée des recettes
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/sizeParam"
        - name: search
          in: query
          description: Recherche textuelle sur le nom de la recette
          required: false
          schema:
            type: string
        - name: categoryIds
          in: query
          description: Filtre par catégories (OR) — répéter le paramètre pour plusieurs valeurs
          required: false
          schema:
            type: array
            items:
              type: string
        - name: difficulties
          in: query
          description: Filtre par niveau de difficulté (OR)
          required: false
          schema:
            type: array
            items:
              type: string
        - name: maxTotalTimeMinutes
          in: query
          description: Filtre par temps total maximum (en minutes)
          required: false
          schema:
            type: integer
            minimum: 1
        - name: collectionIds
          in: query
          description: Filtre par collections (OR) — répéter le paramètre pour plusieurs valeurs
          required: false
          schema:
            type: array
            items:
              type: string
        - name: ingredientNames
          in: query
          description: Filtre par ingrédients (AND) — répéter le paramètre pour plusieurs valeurs
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Page de recettes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipePageDto"

  /api/v1/recipes/{id}:
    get:
      tags: [recipes]
      operationId: getRecipeById
      summary: Détail d'une recette
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recette complète
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDetailDto"
        "404":
          description: Recette introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  # ─── Catégories ──────────────────────────────────────────────────────────────

  /api/v1/categories:
    get:
      tags: [categories]
      operationId: listCategories
      summary: Liste de toutes les catégories
      description: Retourne toutes les catégories triées alphabétiquement.
      responses:
        "200":
          description: Liste des catégories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryDto"

  # ─── Collections ─────────────────────────────────────────────────────────────

  /api/v1/collections:
    get:
      tags: [collections]
      operationId: listCollections
      summary: Liste des collections
      responses:
        "200":
          description: Liste des collections avec leurs chapitres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollectionDto"

  /api/v1/collections/{id}:
    get:
      tags: [collections]
      operationId: getCollectionById
      summary: Détail d'une collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection avec recettes complètes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionDto"
        "404":
          description: Collection introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  # ─── Chat IA ─────────────────────────────────────────────────────────────────

  /api/v1/chat/meal-plan-week:
    post:
      tags: [chat]
      operationId: chatMealPlanWeek
      summary: Planification IA de la semaine
      description: |
        Assistant conversationnel pour planifier les déjeuners et dîners de la semaine.
        Phase 1 : collecte et clarification des contraintes.
        Phase 2 : génération du menu complet et itérations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyPlanChatRequest"
      responses:
        "200":
          description: Réponse de l'assistant de planification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlanChatResponse"
        "422":
          description: Base de recettes vide ou insuffisante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"
        "503":
          description: Service IA indisponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  /api/v1/chat/recipe:
    post:
      tags: [chat]
      operationId: chatRecipe
      summary: Suggestions de recettes
      description: |
        Workflow spécialisé pour la recherche et suggestion de recettes.
        Chaîne les agents : SeasonalContextAgent → RecipeSuggestionAgent (RAG).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageDto"
      responses:
        "200":
          description: Suggestions de recettes de l'assistant IA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponseDto"
        "503":
          description: Service IA indisponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  # ─── Menu Plan ──────────────────────────────────────────────────────────────

  /api/v1/menu-plan:
    get:
      tags: [menu-plan]
      operationId: getWeekPlan
      summary: Plan de la semaine
      parameters:
        - name: weekStart
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Plan de la semaine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuPlanDto"
        "400":
          description: weekStart n'est pas un lundi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  /api/v1/menu-plan/entries/{date}/{mealType}:
    put:
      tags: [menu-plan]
      operationId: upsertEntry
      summary: Ajouter ou remplacer une recette dans un créneau
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
        - name: mealType
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MealType"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanUpsertDto"
      responses:
        "200":
          description: Entrée créée ou mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanEntryDto"
        "404":
          description: Recette introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"
    delete:
      tags: [menu-plan]
      operationId: removeEntry
      summary: Supprimer un créneau (idempotent)
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
        - name: mealType
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MealType"
      responses:
        "204":
          description: Créneau supprimé (ou inexistant)

  /api/v1/menu-plan/suggestions:
    get:
      tags: [menu-plan]
      operationId: getSuggestions
      summary: Suggérer des recettes pour un créneau
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: mealType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/MealType"
        - name: maxTotalMinutes
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 3
      responses:
        "200":
          description: Suggestions de recettes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlanEntryDto"

  /api/v1/menu-plan/entries/bulk:
    post:
      tags: [menu-plan]
      operationId: upsertBulkEntries
      summary: Appliquer plusieurs créneaux en une seule requête
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanBulkRequest"
      responses:
        "200":
          description: Entrées créées ou mises à jour
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealPlanEntryDto"
        "404":
          description: Une des recettes est introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  /api/v1/menu-plan/history:
    get:
      tags: [menu-plan]
      operationId: getRecipeHistory
      summary: Historique d'une recette dans les menus
      parameters:
        - name: recipeId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 52
      responses:
        "200":
          description: Historique de la recette
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeHistoryDto"

# ─── Schemas ───────────────────────────────────────────────────────────────────

components:
  parameters:
    pageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    sizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    # ── Synchronisation ────────────────────────────────────────────────────────

    SyncStatus:
      type: string
      enum: [RUNNING, SUCCESS, PARTIAL, FAILED]

    SyncRunDto:
      type: object
      required: [id, startedAt, status]
      properties:
        id:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: "#/components/schemas/SyncStatus"
        collectionsSynced:
          type: integer
          nullable: true
        recipesSynced:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true

    SyncRunPageDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/SyncRunDto"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    # ── Administration ─────────────────────────────────────────────────────────

    AdminStatsDto:
      type: object
      required: [recipeCount, collectionCount]
      properties:
        recipeCount:
          type: integer
          format: int64
        collectionCount:
          type: integer
          format: int64
        lastSuccessfulSyncAt:
          type: string
          format: date-time
          nullable: true

    # ── Recettes ───────────────────────────────────────────────────────────────

    RecipeSummaryDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        totalTimeMinutes:
          type: integer
          nullable: true
        activeTimeMinutes:
          type: integer
          nullable: true
        difficulty:
          type: string
          nullable: true
        servingSize:
          type: integer
          nullable: true

    RecipePageDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/RecipeSummaryDto"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    IngredientDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    IngredientGroupDto:
      type: object
      required: [name, ingredients]
      properties:
        name:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/IngredientDto"

    CategoryDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    NutritionDto:
      type: object
      required: [type, number, unitType]
      properties:
        type:
          type: string
        number:
          type: number
          format: double
        unitType:
          type: string

    NutritionGroupDto:
      type: object
      required: [name, nutritions]
      properties:
        name:
          type: string
        nutritions:
          type: array
          items:
            $ref: "#/components/schemas/NutritionDto"

    RecipeDetailDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        servingSize:
          type: integer
          nullable: true
        activeTimeMinutes:
          type: integer
          nullable: true
        totalTimeMinutes:
          type: integer
          nullable: true
        notes:
          type: array
          items:
            type: string
        utensils:
          type: array
          items:
            type: string
        ingredientGroups:
          type: array
          items:
            $ref: "#/components/schemas/IngredientGroupDto"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryDto"
        nutritionGroups:
          type: array
          items:
            $ref: "#/components/schemas/NutritionGroupDto"
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true

    # ── Collections ────────────────────────────────────────────────────────────

    CollectionRecipeDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        totalTimeMinutes:
          type: integer
          nullable: true

    ChapterDto:
      type: object
      required: [name, recipes]
      properties:
        name:
          type: string
        recipes:
          type: array
          items:
            $ref: "#/components/schemas/CollectionRecipeDto"

    CollectionDto:
      type: object
      required: [id, name, chapters]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        chapters:
          type: array
          items:
            $ref: "#/components/schemas/ChapterDto"

    # ── Menu Plan ─────────────────────────────────────────────────────────────

    MealType:
      type: string
      enum: [LUNCH, DINNER]

    MenuPlanDto:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/DayPlanDto"

    DayPlanDto:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
        lunch:
          allOf:
            - $ref: "#/components/schemas/MealPlanEntryDto"
          nullable: true
        dinner:
          allOf:
            - $ref: "#/components/schemas/MealPlanEntryDto"
          nullable: true

    MealPlanEntryDto:
      type: object
      required: [recipeName]
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        recipeId:
          type: string
          nullable: true
        recipeName:
          type: string
        recipeThumbnailUrl:
          type: string
          nullable: true
        recipeTotalTimeMinutes:
          type: integer
          nullable: true

    MealPlanUpsertDto:
      type: object
      required: [recipeId]
      properties:
        recipeId:
          type: string

    MealPlanBulkRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MealPlanBulkEntryDto"

    MealPlanBulkEntryDto:
      type: object
      required: [date, mealType, recipeId]
      properties:
        date:
          type: string
          format: date
        mealType:
          $ref: "#/components/schemas/MealType"
        recipeId:
          type: string

    RecipeHistoryDto:
      type: object
      required: [recipeId, dates]
      properties:
        recipeId:
          type: string
        dates:
          type: array
          items:
            type: string
            format: date

    # ── Chat IA ────────────────────────────────────────────────────────────────

    WeeklyPlanChatRequest:
      type: object
      required: [sessionId, weekStart, message]
      properties:
        sessionId:
          type: string
          description: Identifiant de session (UUID côté client)
        weekStart:
          type: string
          format: date
          description: Lundi de la semaine à planifier (ISO-8601)
        message:
          type: string
          description: Message de l'utilisateur, ou "CONFIRM" / "REJECT" pour la confirmation
        constraints:
          allOf:
            - $ref: "#/components/schemas/WeekConstraintsDto"
          nullable: true
          description: Contraintes initiales, présentes uniquement au premier appel

    WeekConstraintsDto:
      type: object
      properties:
        absenceDays:
          type: array
          nullable: true
          items:
            type: string
          description: Jours sans repas (ex. ["MONDAY", "WEDNESDAY"])
        priorityIngredients:
          type: string
          nullable: true
          description: Ingrédients à utiliser en priorité (texte libre)
        thermalConstraintDays:
          type: array
          nullable: true
          items:
            type: string
          description: Jours où le four est à éviter
        freeText:
          type: string
          nullable: true
          description: Remarques libres supplémentaires

    WeeklyPlanChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
          description: Réponse conversationnelle de l'IA (Markdown)
        proposedChanges:
          type: array
          nullable: true
          description: Modifications en attente de confirmation (null si déjà appliquées)
          items:
            $ref: "#/components/schemas/PendingMealChangeDto"
        quickActions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/QuickActionDto"

    PendingMealChangeDto:
      type: object
      required: [date, mealType, recipeId, recipeName]
      properties:
        date:
          type: string
          format: date
        mealType:
          $ref: "#/components/schemas/MealType"
        recipeId:
          type: string
        recipeName:
          type: string
        previousRecipeName:
          type: string
          nullable: true
          description: Nom de la recette remplacée (null si créneau vide)

    QuickActionDto:
      type: object
      required: [label, action]
      properties:
        label:
          type: string
          description: Texte affiché sur le chip
        action:
          type: string
          description: Message à renvoyer comme prochain message utilisateur

    ChatMessageDto:
      type: object
      required: [sessionId, message]
      properties:
        sessionId:
          type: string
          description: Identifiant de session pour la mémoire conversationnelle
        message:
          type: string
          description: Message de l'utilisateur

    ChatResponseDto:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
          description: Réponse de l'assistant IA
        suggestions:
          type: array
          nullable: true
          description: Recettes suggérées par l'IA
          items:
            $ref: "#/components/schemas/RecipeSummaryDto"

    # ── Erreurs ────────────────────────────────────────────────────────────────

    ErrorDto:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: string
          nullable: true
